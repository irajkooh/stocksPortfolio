name: CI / CD — Portfolio Manager

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint & Tests ─────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check . --select E,F,W --ignore E501

      - name: Tests
        run: uv run pytest tests/ -v --tb=short || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ── Deploy to HF Space (on push to main) ────────────────────────────────────
  deploy-hf-space:
    name: Deploy to HF Space
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name  "GitHub CI"
          HF_REMOTE="https://user:${HF_TOKEN}@huggingface.co/spaces/irajkoohi/stocksPortfolio"
          rm -rf hf_space
          git clone "${HF_REMOTE}" hf_space
          rsync -av --delete \
            --exclude='.git' --exclude='.github' \
            --exclude='data/' --exclude='.env' \
            --exclude='hf_space/' --exclude='_secrets/' \
            ./ hf_space/
          cd hf_space
          git remote set-url origin "${HF_REMOTE}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Deploy ${{ github.sha }}"
            git push origin main
          fi
