name: CI / CD — Portfolio Manager

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Lint & Tests ─────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check . --select E,F,W --ignore E501

      - name: Tests
        run: uv run pytest tests/ -v --tb=short || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ── Drift Check (manual / scheduled) ─────────────────────────────────────────
  drift-check:
    name: Drift Detection
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch'
    outputs:
      drift: ${{ steps.drift.outputs.drift }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync

      - name: Run drift check
        id: drift
        run: |
          uv run python scripts/check_drift.py --tickers AAPL MSFT GOOGL AMZN TSLA \
            && echo "drift=false" >> $GITHUB_OUTPUT \
            || echo "drift=true"  >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report
          path: data/drift_report.json
          if-no-files-found: ignore

  # ── Retrain if drift ──────────────────────────────────────────────────────────
  retrain:
    name: Retrain RL Model
    runs-on: ubuntu-latest
    needs: drift-check
    if: needs.drift-check.outputs.drift == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync

      - name: Retrain
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          uv run python scripts/retrain.py \
            --tickers AAPL MSFT GOOGL AMZN TSLA \
            --budget 100000 --period 2y --timesteps 20000

  # ── Deploy to HF Space (on push to main) ────────────────────────────────────
  deploy-hf-space:
    name: Deploy to HF Space
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name  "GitHub CI"
          git clone https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/irajkoohi/stocksPortfolio hf_space
          rsync -av --delete \
            --exclude='.git' --exclude='data/' --exclude='.env' \
            ./ hf_space/
          cd hf_space
          git add -A
          git diff --cached --quiet || \
            git commit -m "Deploy ${{ github.sha }}" && git push origin main
